<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blaze Buster - St. Luke's Mission</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #0f172a; font-family: 'Segoe UI', sans-serif; color: #f7fafc; overflow: hidden; touch-action: none; user-select: none; }
        
        #pre-game-box, #player-form-box, #start-menu, .checkpoint-box, #buster-comment-box, #buster-error-box { 
            text-align: center; background: #1e293b; padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 450px; z-index: 100;
        }
        #player-form-box, #start-menu, #game-section, .checkpoint-box, #buster-comment-box, #buster-error-box { display: none; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #60a5fa; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }

        .play-icon-btn, .buster-character { font-size: 100px; cursor: pointer; animation: buster-bounce 2s infinite ease-in-out; display: inline-block; }
        @keyframes buster-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .speech-bubble { background: #ffffff; color: #1e293b; padding: 20px; border-radius: 15px; margin: 20px auto; position: relative; font-weight: bold; }
        .speech-bubble:after { content: ''; position: absolute; bottom: -15px; left: 50%; border-width: 15px 15px 0; border-style: solid; border-color: #ffffff transparent; display: block; width: 0; margin-left: -15px; }

        .main-controls { width: 95%; max-width: 800px; margin-bottom: 10px; display: none; gap: 10px; align-items: center; background: #1e293b; padding: 10px; border-radius: 12px; justify-content: space-between; z-index: 10; }
        canvas { width: 100%; height: auto; border: 4px solid #334155; background-color: #55b5d9; border-radius: 12px; cursor: crosshair; touch-action: none; }
        
        #gameplay-tip { color: #fbbf24; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite; text-align: center; width: 100%; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .progress-container { width: 90%; height: 10px; background: #334155; border-radius: 10px; margin: 10px auto; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); transition: width 0.3s; }
        
        #major-blaze-box { display: none; color: #ef4444; padding: 10px; border-radius: 10px; position: absolute; top: 250px; left: 50%; transform: translateX(-50%); z-index: 50; text-align: center; }
        #final-meter-container { width: 150px; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin: 5px auto; border: 1px solid white; }
        #final-meter-fill { width: 100%; height: 100%; background: #ef4444; }

        .checkpoint-box { background: white; color: #1e293b; max-height: 90vh; overflow-y: auto; }
        .diagram-wrapper { position: relative; width: 300px; height: 350px; background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpPUDif2LkKX4bx3_sXJquY6_nF20kS_56aw&s'); background-size: contain; background-repeat: no-repeat; background-position: center; margin: 0 auto; display: none; }
        .part-indicator { position: absolute; width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; z-index: 5; }
        .part-line { position: absolute; background: #3b82f6; height: 2px; transform-origin: left center; z-index: 4; }
        .part-target { position: absolute; border: 2px dashed #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 4px; width: 75px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 8px; text-align: center; font-weight: bold; z-index: 6; }
        .filled-correct { background: #1e3a8a !important; color: white !important; border-style: solid !important; border-width: 1px !important; font-size: 8px !important; }
        
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .choice-box-uniform { padding: 12px; background: #2563eb; color: white; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        .drop-zone { border: 2px dashed #94a3b8; border-radius: 10px; padding: 10px; background: #f1f5f9; min-height: 50px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .filled-correct-grid { background: #dcfce7 !important; border: 2px solid #16a34a !important; color: #166534 !important; }

        .rainbow-grid { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; padding: 10px 0; width: 100%; }
        .rainbow-box { width: 52px; height: 70px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: white; text-transform: uppercase; flex-shrink: 0; }
        
        .blank-inline { display: inline-flex; width: 80px; height: 25px; border-bottom: 2px solid #3b82f6; margin: 0 5px; vertical-align: middle; color: #2563eb; font-weight: bold; justify-content: center; align-items: center; }
        .slot-correct { background: #dcfce7; border-bottom: 2px solid #16a34a; color: #166534; }
        
        #buster-error-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 5000; width: 90%; max-width: 400px; border: 4px solid #ef4444; }

        .btn { padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #3b82f6; color: white; width: 100%; margin-top: 10px; }
        .btn-green { background: #16a34a; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="your-direct-link-to-music.mp3" type="audio/mpeg">
    </audio>

    <div id="pre-game-box">
        <h1 style="color: #60a5fa; margin-bottom: 10px;">Blaze Buster</h1>
        <div class="play-icon-btn" onclick="showForm()">🧯</div>
        <div style="color: #ef4444; font-weight: bold; margin-top: 15px;">TAP BUSTER TO START</div>
    </div>

    <div id="player-form-box">
        <h2 style="color: #60a5fa; margin-top:0; text-align: center;">PLAYER DETAILS</h2>
        <div class="form-group">
            <label>ST. LUKE'S LOCATION</label>
            <select id="user-location" onchange="validate()">
                <option value="" disabled selected>Select Location</option>
                <option value="GLOBAL CITY">GLOBAL CITY</option>
                <option value="QUEZON CITY">QUEZON CITY</option>
                <option value="EXTENSION CLINIC">EXTENSION CLINIC</option>
                <option value="COLLEGE OF MEDICINE">COLLEGE OF MEDICINE</option>
            </select>
        </div>
        <div class="form-group">
            <label>PLAYER NUMBER</label>
            <input type="text" id="user-id" placeholder="Enter ID number" oninput="validate(); this.value = this.value.replace(/[^0-9]/g, '');">
        </div>
        <button class="btn" id="form-submit-btn" style="opacity: 0.5;" onclick="saveDetails()">PROCEED</button>
    </div>

    <div id="start-menu">
        <div id="buster-bubble" class="speech-bubble">Glad you're here, Partner!</div>
        <div class="buster-character" style="font-size: 80px;">🧯</div>
        <button class="btn" id="story-btn" onclick="nextStoryStep()">NEXT</button>
        <button class="btn" id="start-mission-btn" style="background:#16a34a; display:none;" onclick="startGame()">IGNITE MISSION!</button>
    </div>

    <div class="main-controls" id="top-bar">
        <div id="status-text" style="color: #60a5fa; font-weight: bold;">Extinguished: 0</div>
        <div id="wave-text" style="color: #fbbf24; font-weight: bold;">Wave 1/10</div>
    </div>

    <div id="game-section">
        <div id="gameplay-tip">Tap or Hold to Extinguish the Fire</div>
        <div id="major-blaze-box">
            <div style="font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 14px;">⚠️ MEGA BLAZE ⚠️</div>
            <div id="final-meter-container"><div id="final-meter-fill"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="progress-container"><div class="progress-fill" id="p-bar-main"></div></div>
    </div>

    <div id="logic-box" class="checkpoint-box">
        <h2 id="logic-title"></h2>
        <div id="logic-desc"></div>
        <button id="logic-start-btn" class="btn" onclick="startLogicTask()">PROCEED</button>
        <div id="logic-body"></div>
        <button id="logicNextBtn" class="btn btn-green" style="display:none;" onclick="showBusterComment()">CONTINUE</button>
    </div>

    <div id="buster-comment-box">
        <div id="buster-comment-text" class="speech-bubble"></div>
        <div class="buster-character" style="font-size: 60px;">🧯</div>
        <button id="busterCommentBtn" class="btn btn-green" onclick="finalReturnToHallway()">CONTINUE →</button>
    </div>

    <div id="buster-error-box">
        <div class="speech-bubble" style="background: #fee2e2; color: #991b1b;">Whoops! Try again!</div>
        <button class="btn btn-green" onclick="closeError()">TRY AGAIN</button>
    </div>

    <div id="congrats" class="checkpoint-box">
        <h1 style="color:#2563eb;">MISSION COMPLETE!</h1>
        <button class="btn" onclick="revealCodeRedirect()">REVEAL MY CODE</button>
    </div>

<script>
    let gameActive = false, wavesCleared = 0, currentScore = 0, totalExtinguished = 0;
    let extY = 150, targetY = 150, bgOffset = 0, playerID = "", playerLocation = "";
    let isSpraying = false, particles = [], fires = [], majorBlazeActive = false, bossHealth = 100, bossX = 1000;
    const bgMusic = document.getElementById("bgMusic");

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 350;

    const busterComments = [
        "Nice work! Wave 1 complete.", "Backup is coming!", "Ground is steady!", "Perfect aim!",
        "Protocol followed!", "Hazard reported!", "Exits secured!", "Security is here!", "Solid leadership!", "Mission Complete!"
    ];

    function showForm() { document.getElementById('pre-game-box').style.display='none'; document.getElementById('player-form-box').style.display='block'; }
    function validate() { 
        const loc = document.getElementById('user-location').value;
        const id = document.getElementById('user-id').value.trim();
        document.getElementById('form-submit-btn').style.opacity = (loc && id) ? "1" : "0.5";
    }
    function saveDetails() { playerID = document.getElementById('user-id').value; playerLocation = document.getElementById('user-location').value; document.getElementById('player-form-box').style.display='none'; document.getElementById('start-menu').style.display='block'; }
    
    function nextStoryStep() {
        document.getElementById('story-btn').style.display = 'none';
        document.getElementById('start-mission-btn').style.display = 'inline-block';
    }

    // START GAME & MUSIC
    function startGame() {
        bgMusic.volume = 0.5;
        bgMusic.play().catch(e => console.log("Autoplay blocked, waiting for interaction."));
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('game-section').style.display = 'block';
        document.getElementById('top-bar').style.display = 'flex';
        gameActive = true;
        initControls();
        setInterval(spawnFire, 1500);
        requestAnimationFrame(loop);
    }

    // WAVE ROUTING (FIXED FOR WAVE 6)
    function triggerCheckpoint() {
        gameActive = false;
        document.getElementById('game-section').style.display = 'none';
        const waveNum = wavesCleared + 1;

        if(waveNum === 6) setupS6(6);
        else if(waveNum === 7) setupS6(7);
        else if(waveNum === 8) setupS6(8);
        else showBusterComment();
    }

    function setupS6(s) {
        document.getElementById("logic-box").style.display = 'block';
        document.getElementById("logic-start-btn").style.display = 'block';
        document.getElementById("logic-body").style.display = 'none';
        document.getElementById("logicNextBtn").style.display = 'none';
        
        let title = "", scenarioText = "", winC = "";
        const colors = ['Red', 'Orange', 'Black', 'Green', 'Blue', 'Pink', 'Silver'];

        if (s === 6) { title = "Chemical Spill"; scenarioText = "Identify the Hazardous Material Spill code:"; winC = "Orange"; }
        else if (s === 7) { title = "Missing Child"; scenarioText = "Identify the Abduction code:"; winC = "Pink"; }
        else if (s === 8) { title = "Active Shooter"; scenarioText = "Identify the Armed Threat code:"; winC = "Silver"; }

        document.getElementById("logic-title").innerText = title;
        document.getElementById("logic-desc").innerText = scenarioText;
        
        document.getElementById("logic-body").innerHTML = `<div class="rainbow-grid">` + colors.map(c => {
            let bg = c.toLowerCase();
            if(bg==='silver') bg='#717171'; if(bg==='pink') bg='#FF1493'; if(bg==='black') bg='#000';
            return `<div class="rainbow-box" style="background:${bg}" onclick="checkColor('${c}', '${winC}')">${c}</div>`;
        }).join('') + `</div>`;
    }

    function checkColor(selected, correct) {
        if(selected === correct) document.getElementById("logicNextBtn").style.display = 'block';
        else triggerErr();
    }

    function triggerErr() { document.getElementById('buster-error-box').style.display = 'block'; }
    function closeError() { document.getElementById('buster-error-box').style.display = 'none'; }
    function startLogicTask() { document.getElementById('logic-start-btn').style.display='none'; document.getElementById('logic-body').style.display='block'; }
    
    function showBusterComment() {
        document.getElementById('logic-box').style.display = 'none';
        document.getElementById('buster-comment-box').style.display = 'block';
        document.getElementById('buster-comment-text').innerText = busterComments[wavesCleared];
    }

    function finalReturnToHallway() {
        wavesCleared++;
        document.getElementById('buster-comment-box').style.display = 'none';
        if(wavesCleared >= 10) { document.getElementById('congrats').style.display = 'block'; return; }
        document.getElementById('game-section').style.display = 'block';
        document.getElementById('p-bar-main').style.width = (wavesCleared * 10) + "%";
        gameActive = true;
        currentScore = 0;
        majorBlazeActive = false;
        bossHealth = 100;
        updateHUD();
    }

    // GAME LOOP LOGIC
    function initControls() {
        canvas.addEventListener("pointerdown", () => isSpraying = true);
        window.addEventListener("pointerup", () => isSpraying = false);
        canvas.addEventListener("pointermove", (e) => {
            const rect = canvas.getBoundingClientRect();
            targetY = (e.clientY - rect.top) * (canvas.height / rect.height) - 35;
        });
    }

    function spawnFire() { if(gameActive && !majorBlazeActive) fires.push({ x: 850, y: 80 + Math.random()*160, alive: true }); }

    function loop() {
        if(!gameActive) return;
        ctx.clearRect(0,0,800,350);
        // Background
        ctx.fillStyle = "#55b5d9"; ctx.fillRect(0,0,800,280);
        ctx.fillStyle = "#ced9e1"; ctx.fillRect(0,280,800,70);

        extY += (targetY - extY) * 0.1;
        ctx.font = "80px Arial"; ctx.fillText("🧯", 40, extY + 70);

        if(isSpraying) {
            ctx.fillStyle = "white";
            for(let i=0; i<3; i++) {
                let px = 120 + Math.random()*20;
                let py = extY + 45 + (Math.random()-0.5)*20;
                ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
            }
        }

        fires.forEach(f => {
            if(f.alive) {
                f.x -= 3; ctx.font = "50px Arial"; ctx.fillText("🔥", f.x, f.y);
                if(isSpraying && Math.abs(f.x - 150) < 80 && Math.abs(f.y - (extY+45)) < 50) {
                    f.alive = false; totalExtinguished++; currentScore++; updateHUD();
                    if(currentScore >= 5) triggerMajorBlaze();
                }
            }
        });

        if(majorBlazeActive) {
            bossX -= (bossX > 500) ? 2 : 0;
            ctx.font = "150px Arial"; ctx.fillText("🔥", bossX, 220);
            if(isSpraying && bossX <= 550) {
                bossHealth -= 0.5;
                document.getElementById('final-meter-fill').style.width = bossHealth + "%";
                if(bossHealth <= 0) triggerCheckpoint();
            }
        }
        requestAnimationFrame(loop);
    }

    function triggerMajorBlaze() { majorBlazeActive = true; document.getElementById('major-blaze-box').style.display = 'block'; bossX = 850; }
    function updateHUD() { document.getElementById('status-text').innerText = `Extinguished: ${totalExtinguished}`; document.getElementById('wave-text').innerText = `Wave ${wavesCleared + 1}/10`; }
    function revealCodeRedirect() { window.open(`https://script.google.com/macros/s/AKfycbzcqiGztCFof_d6KkI0lKw8UTtFfJZ0RSVFI8WbiuCGtbXYXeCv9hqtipcvAhQPpV3O/exec?code=SLMC-CERT-${playerID}`, "_blank"); }
</script>
</body>
</html>
